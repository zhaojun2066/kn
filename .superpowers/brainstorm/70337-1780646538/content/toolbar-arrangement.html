<h2>Sidebar 操作按钮排列方式</h2>
<p class="subtitle">7 个操作（新增、默认、复制、导入▾、刷新、备份、恢复）如何在 Sidebar 中排列？</p>

<div class="options">
  <div class="option" data-choice="single-row" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单行排列</h3>
      <p>所有 7 个图标排成一行，搜索栏上方。空间紧凑，适合熟悉图标的用户。</p>
      <div style="margin-top:8px;background:#141428;border:1px solid #333;border-radius:3px;padding:8px;display:flex;align-items:center;gap:4px;font-size:12px;">
        <span style="background:#4a9eff;color:#fff;padding:4px 10px;border-radius:2px;font-size:11px;">+ 新增</span>
        <span style="color:#aaa;padding:4px 6px;" title="默认">★</span>
        <span style="color:#aaa;padding:4px 6px;">⧉</span>
        <span style="color:#aaa;padding:4px 6px;display:flex;align-items:center;gap:2px;">↓ ▾</span>
        <span style="color:#444;margin:0 2px;">|</span>
        <span style="color:#888;padding:4px 6px;">↻</span>
        <span style="color:#888;padding:4px 6px;">💾</span>
        <span style="color:#888;padding:4px 6px;">↺</span>
      </div>
    </div>
  </div>

  <div class="option" data-choice="two-rows" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>两行分组</h3>
      <p>第一行：主要操作（新增 默认 复制 导入），第二行：管理操作（刷新 备份 恢复），视觉层次清晰。</p>
      <div style="margin-top:8px;background:#141428;border:1px solid #333;border-radius:3px;padding:8px;">
        <div style="display:flex;align-items:center;gap:4px;font-size:12px;margin-bottom:4px;">
          <span style="background:#4a9eff;color:#fff;padding:3px 10px;border-radius:2px;font-size:11px;">+ 新增</span>
          <span style="color:#aaa;padding:3px 6px;">★</span>
          <span style="color:#aaa;padding:3px 6px;">⧉</span>
          <span style="color:#aaa;padding:3px 6px;display:flex;align-items:center;gap:2px;">↓ ▾</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;">
          <span style="color:#666;padding:2px 5px;">↻ 刷新</span>
          <span style="color:#666;padding:2px 5px;">💾 备份</span>
          <span style="color:#666;padding:2px 5px;">↺ 恢复</span>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="primary-with-more" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>精简主行 + 更多菜单</h3>
      <p>只露出最常用的（新增、默认），其余收入 "⋯" 更多菜单。最简洁，但低频操作需要多点一次。</p>
      <div style="margin-top:8px;background:#141428;border:1px solid #333;border-radius:3px;padding:8px;display:flex;align-items:center;gap:4px;font-size:12px;">
        <span style="background:#4a9eff;color:#fff;padding:4px 10px;border-radius:2px;font-size:11px;">+ 新增</span>
        <span style="color:#aaa;padding:4px 6px;">★</span>
        <span style="color:#aaa;padding:4px 6px;">⋯</span>
      </div>
    </div>
  </div>
</div>
