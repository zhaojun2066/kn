# git-cliff configuration for AI Profile Manager
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# Only generate the latest release section, not the full history
header = ""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
  - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{{ commit.message | upper_first }}\
 ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/zhaojun2066/kn/commit/{{ commit.id }}))\
{% if commit.breaking %} **BREAKING**{% endif %}\
{% endfor %}
{% endfor %}
{% if previous and previous.version %}\

### Full Changelog

[{{ previous.version }}...{{ version }}](https://github.com/zhaojun2066/kn/compare/{{ previous.version }}...{{ version }})
{% endif %}\
"""
trim = true
postprocessors = [
  { pattern = " *\\(\\*\\*\\) *", replace = " " },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^refactor", group = "🔧 Refactoring" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^test", group = "✅ Testing" },
  { message = "^chore", group = "🧹 Miscellaneous" },
  { message = "^ci", group = "🧹 Miscellaneous" },
  { message = "^build", group = "🧹 Miscellaneous" },
  { message = "^release", group = "🧹 Miscellaneous" },
  { message = ".*", group = "📦 Other" },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/zhaojun2066/kn/issues/$1" },
]

[remote.github]
owner = "zhaojun2066"
repo = "kn"
