name: Build Desktop App

on:
  # Tag push triggers automatic release (e.g., v1.0.7)
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  # Manual trigger retained as fallback
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.7). Must match tauri.conf.json"
        required: false
        type: string
      release_notes_override:
        description: "Custom release notes (overrides auto-generation if provided)"
        required: false
        type: string

jobs:
  # ── Validate version before building ──
  validate:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for tag comparison

      - name: Read and validate versions
        id: version
        run: |
          APP_VERSION=$(grep '"version"' desktop/src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

          # Determine the target version
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION=$(echo "${{ github.ref }}" | sed 's|refs/tags/v||')
          elif [ -n "${{ inputs.version }}" ]; then
            TAG_VERSION="${{ inputs.version }}"
          else
            TAG_VERSION="$APP_VERSION"
          fi
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT

          # Validation 1: tag version matches tauri.conf.json version
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error:: tauri.conf.json version ($APP_VERSION) does not match tag/input version ($TAG_VERSION)"
            exit 1
          fi

          # Validation 2: version is newer than latest existing release tag
          LATEST_TAG=$(git tag --sort=-version:refname 'v*' 2>/dev/null | grep -v "v$APP_VERSION" | head -1 | sed 's/^v//')
          if [ -n "$LATEST_TAG" ]; then
            HIGHER=$(printf "%s\n%s" "$APP_VERSION" "$LATEST_TAG" | sort -V | tail -1)
            if [ "$HIGHER" != "$APP_VERSION" ]; then
              echo "::error:: version $APP_VERSION is not newer than latest release $LATEST_TAG"
              exit 1
            fi
            echo "previous_tag=v$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "previous_tag=" >> $GITHUB_OUTPUT
          fi

          echo "✅ Validated: releasing v$APP_VERSION"

  # ── Build all platforms in parallel ──
  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-apple-silicon
            platform: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
            platform: darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      - name: Build kn-agent
        run: |
          cargo build --release --bin kn-agent
          mkdir -p desktop/src-tauri/resources
          cp target/release/kn-agent desktop/src-tauri/resources/kn-agent
          chmod +x desktop/src-tauri/resources/kn-agent
          echo "✅ kn-agent copied to desktop/src-tauri/resources/"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary-keychain-password' }}
        run: |
          CERTIFICATE_PATH=$(mktemp -d)/certificate.p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERTIFICATE_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          echo "✅ Certificate imported"

      - name: Build Tauri
        working-directory: desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Notarize .dmg
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          DMG=$(find desktop/src-tauri/target/${{ matrix.target }}/release/bundle -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            echo "Notarizing: $DMG"
            xcrun notarytool submit "$DMG" \
              --key <(echo "$APPLE_NOTARY_KEY") \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --wait
            xcrun stapler staple "$DMG"
            echo "✅ Notarized and stapled: $DMG"
          else
            echo "⚠️  No .dmg found, skipping notarization"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/

  # ── Generate release notes, manifest, and publish ──
  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.validate.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git-cliff

      - name: Download macOS Apple Silicon
        uses: actions/download-artifact@v4
        with:
          name: macos-apple-silicon
          path: assets/darwin-aarch64

      - name: Download macOS Intel
        uses: actions/download-artifact@v4
        with:
          name: macos-intel
          path: assets/darwin-x86_64

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.8.0"
          curl -sL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mv git-cliff-*/git-cliff /usr/local/bin/
          chmod +x /usr/local/bin/git-cliff
          git cliff --version

      - name: Generate release notes
        run: |
          if [ -n "${{ inputs.release_notes_override }}" ]; then
            echo "${{ inputs.release_notes_override }}" > release-notes.md
          else
            # Generate notes for the latest tag
            git cliff --latest -o release-notes.md

            # If empty (no previous tag), try unreleased changes
            if [ ! -s release-notes.md ]; then
              git cliff --unreleased -o release-notes.md
            fi

            # Ultimate fallback
            if [ ! -s release-notes.md ]; then
              echo "## v$APP_VERSION" > release-notes.md
              echo "" >> release-notes.md
              echo "Release v$APP_VERSION" >> release-notes.md
            fi
          fi
          echo "=== Generated Release Notes ==="
          cat release-notes.md

      - name: Generate download.json manifest
        run: |
          echo '{"version":"","notes":"","platforms":{}}' > download.json

          # darwin-aarch64
          DMG=$(find assets/darwin-aarch64 -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            SHA=$(sha256sum "$DMG" | cut -d' ' -f1)
            FNAME=$(basename "$DMG" | sed 's/ /./g')
            jq --arg url "https://github.com/zhaojun2066/kn/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["darwin-aarch64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # darwin-x86_64
          DMG=$(find assets/darwin-x86_64 -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            SHA=$(sha256sum "$DMG" | cut -d' ' -f1)
            FNAME=$(basename "$DMG" | sed 's/ /./g')
            jq --arg url "https://github.com/zhaojun2066/kn/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["darwin-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # Embed release notes into download.json (for in-app update dialog)
          jq --arg v "$APP_VERSION" --rawfile n release-notes.md \
             '.version = $v | .notes = $n' download.json > tmp && mv tmp download.json

          echo "=== download.json ==="
          cat download.json

      - name: Create Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          overwrite_files: true
          fail_on_unmatched_files: false
          body_path: release-notes.md
          files: |
            assets/**/*.dmg
            download.json
          draft: false
          prerelease: false
