name: Build Desktop App

on:
  # 注释掉自动触发，改为手动触发。桌面构建耗时长（4 个平台），每次 push 都跑太浪费。
  # 需要发布新版本时，去 Actions → Build Desktop App → Run workflow 手动执行。
  # push:
  #   branches: [main]
  #   paths:
  #     - "desktop/**"
  #     - ".github/workflows/build-desktop.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-apple-silicon
            platform: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
            platform: darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            platform: windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            platform: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      - name: Build Tauri
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VER=$(grep '"version"' desktop/src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "APP_VERSION=$VER" >> $GITHUB_ENV
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Download macOS Apple Silicon
        uses: actions/download-artifact@v4
        with:
          name: macos-apple-silicon
          path: assets/darwin-aarch64

      - name: Download macOS Intel
        uses: actions/download-artifact@v4
        with:
          name: macos-intel
          path: assets/darwin-x86_64

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: assets/windows-x86_64

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: assets/linux-x86_64

      - name: Generate download.json manifest
        run: |
          echo '{"version":"","notes":"","platforms":{}}' > download.json

          # darwin-aarch64
          DMG=$(find assets/darwin-aarch64 -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            SHA=$(sha256sum "$DMG" | cut -d' ' -f1)
            FNAME=$(basename "$DMG" | sed 's/ /./g')
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["darwin-aarch64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # darwin-x86_64
          DMG=$(find assets/darwin-x86_64 -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            SHA=$(sha256sum "$DMG" | cut -d' ' -f1)
            FNAME=$(basename "$DMG" | sed 's/ /./g')
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["darwin-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # windows-x86_64 — prefer NSIS .exe (no MSI policy restrictions), fall back to .msi
          EXE=$(find assets/windows-x86_64 -name "*.exe" | head -1)
          MSI=$(find assets/windows-x86_64 -name "*.msi" | head -1)
          if [ -f "$EXE" ]; then
            SHA=$(sha256sum "$EXE" | cut -d' ' -f1)
            FNAME=$(basename "$EXE")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["windows-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          elif [ -f "$MSI" ]; then
            SHA=$(sha256sum "$MSI" | cut -d' ' -f1)
            FNAME=$(basename "$MSI")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["windows-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # linux-x86_64
          DEB=$(find assets/linux-x86_64 -name "*.deb" | head -1)
          if [ -f "$DEB" ]; then
            SHA=$(sha256sum "$DEB" | cut -d' ' -f1)
            FNAME=$(basename "$DEB")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["linux-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          jq --arg v "$APP_VERSION" --arg n "自动构建版本 $APP_VERSION" \
             '.version = $v | .notes = $n' download.json > tmp && mv tmp download.json

          echo "=== download.json ==="
          cat download.json

      - name: Create Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          overwrite_files: true
          fail_on_unmatched_files: false
          body: |
            自动构建版本。

            | 平台 | 文件 |
            |------|------|
            | macOS Apple Silicon | `.dmg` |
            | macOS Intel | `.dmg` |
            | Windows x64 | `.exe` / `.msi` |
            | Linux x64 | `.deb` |
          files: |
            assets/**/*.dmg
            assets/**/*.exe
            assets/**/*.msi
            assets/**/*.deb
            assets/**/*.AppImage
            download.json
          draft: false
          prerelease: false
