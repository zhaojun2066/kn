name: Build Desktop App

on:
  # Tag push triggers automatic release (e.g., v1.0.7)
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  # Manual trigger retained as fallback
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.7). Must match tauri.conf.json"
        required: false
        type: string
      release_notes_override:
        description: "Custom release notes (overrides auto-generation if provided)"
        required: false
        type: string

jobs:
  # ── Validate version before building ──
  validate:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for tag comparison

      - name: Read and validate versions
        id: version
        run: |
          APP_VERSION=$(grep '"version"' desktop/src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

          # Determine the target version
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION=$(echo "${{ github.ref }}" | sed 's|refs/tags/v||')
          elif [ -n "${{ inputs.version }}" ]; then
            TAG_VERSION="${{ inputs.version }}"
          else
            TAG_VERSION="$APP_VERSION"
          fi
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT

          # Validation 1: tag version matches tauri.conf.json version
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error:: tauri.conf.json version ($APP_VERSION) does not match tag/input version ($TAG_VERSION)"
            exit 1
          fi

          # Validation 2: version is newer than latest existing release tag
          LATEST_TAG=$(git tag --sort=-version:refname 'v*' 2>/dev/null | grep -v "v$APP_VERSION" | head -1 | sed 's/^v//')
          if [ -n "$LATEST_TAG" ]; then
            HIGHER=$(printf "%s\n%s" "$APP_VERSION" "$LATEST_TAG" | sort -V | tail -1)
            if [ "$HIGHER" != "$APP_VERSION" ]; then
              echo "::error:: version $APP_VERSION is not newer than latest release $LATEST_TAG"
              exit 1
            fi
            echo "previous_tag=v$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "previous_tag=" >> $GITHUB_OUTPUT
          fi

          echo "✅ Validated: releasing v$APP_VERSION"

  # ── Build all platforms in parallel ──
  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-apple-silicon
            platform: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
            platform: darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            platform: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: windows-arm64
            platform: windows-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            platform: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      - name: Build Tauri
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/

  # ── Generate release notes, manifest, and publish ──
  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.validate.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git-cliff

      - name: Download macOS Apple Silicon
        uses: actions/download-artifact@v4
        with:
          name: macos-apple-silicon
          path: assets/darwin-aarch64

      - name: Download macOS Intel
        uses: actions/download-artifact@v4
        with:
          name: macos-intel
          path: assets/darwin-x86_64

      - name: Download Windows x64
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: assets/windows-x86_64

      - name: Download Windows ARM64
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: assets/windows-arm64

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: assets/linux-x86_64

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.8.0"
          curl -sL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mv git-cliff-*/git-cliff /usr/local/bin/
          chmod +x /usr/local/bin/git-cliff
          git cliff --version

      - name: Generate release notes
        run: |
          if [ -n "${{ inputs.release_notes_override }}" ]; then
            echo "${{ inputs.release_notes_override }}" > release-notes.md
          else
            # Generate notes for the latest tag
            git cliff --latest -o release-notes.md

            # If empty (no previous tag), try unreleased changes
            if [ ! -s release-notes.md ]; then
              git cliff --unreleased -o release-notes.md
            fi

            # Ultimate fallback
            if [ ! -s release-notes.md ]; then
              echo "## v$APP_VERSION" > release-notes.md
              echo "" >> release-notes.md
              echo "Release v$APP_VERSION" >> release-notes.md
            fi
          fi
          echo "=== Generated Release Notes ==="
          cat release-notes.md

      - name: Generate download.json manifest
        run: |
          echo '{"version":"","notes":"","platforms":{}}' > download.json

          # darwin-aarch64
          DMG=$(find assets/darwin-aarch64 -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            SHA=$(sha256sum "$DMG" | cut -d' ' -f1)
            FNAME=$(basename "$DMG" | sed 's/ /./g')
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["darwin-aarch64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # darwin-x86_64
          DMG=$(find assets/darwin-x86_64 -name "*.dmg" | head -1)
          if [ -f "$DMG" ]; then
            SHA=$(sha256sum "$DMG" | cut -d' ' -f1)
            FNAME=$(basename "$DMG" | sed 's/ /./g')
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["darwin-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # windows-x86_64 — prefer NSIS .exe (no MSI policy restrictions), fall back to .msi
          EXE=$(find assets/windows-x86_64 -name "*.exe" | head -1)
          MSI=$(find assets/windows-x86_64 -name "*.msi" | head -1)
          if [ -f "$EXE" ]; then
            SHA=$(sha256sum "$EXE" | cut -d' ' -f1)
            FNAME=$(basename "$EXE")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["windows-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          elif [ -f "$MSI" ]; then
            SHA=$(sha256sum "$MSI" | cut -d' ' -f1)
            FNAME=$(basename "$MSI")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["windows-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # windows-arm64
          EXE=$(find assets/windows-arm64 -name "*.exe" | head -1)
          MSI=$(find assets/windows-arm64 -name "*.msi" | head -1)
          if [ -f "$EXE" ]; then
            SHA=$(sha256sum "$EXE" | cut -d' ' -f1)
            FNAME=$(basename "$EXE")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["windows-arm64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          elif [ -f "$MSI" ]; then
            SHA=$(sha256sum "$MSI" | cut -d' ' -f1)
            FNAME=$(basename "$MSI")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["windows-arm64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # linux-x86_64
          DEB=$(find assets/linux-x86_64 -name "*.deb" | head -1)
          if [ -f "$DEB" ]; then
            SHA=$(sha256sum "$DEB" | cut -d' ' -f1)
            FNAME=$(basename "$DEB")
            jq --arg url "https://github.com/zhaojun2066/ai-profile-manager/releases/download/v$APP_VERSION/$FNAME" \
               --arg sha "$SHA" \
               '.platforms["linux-x86_64"] = {url: $url, sha256: $sha}' download.json > tmp && mv tmp download.json
          fi

          # Embed release notes into download.json (for in-app update dialog)
          jq --arg v "$APP_VERSION" --rawfile n release-notes.md \
             '.version = $v | .notes = $n' download.json > tmp && mv tmp download.json

          echo "=== download.json ==="
          cat download.json

      - name: Create Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          overwrite_files: true
          fail_on_unmatched_files: false
          body_path: release-notes.md
          files: |
            assets/**/*.dmg
            assets/**/*.exe
            assets/**/*.msi
            assets/**/*.deb
            assets/**/*.AppImage
            download.json
          draft: false
          prerelease: false
