name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check

      - name: cargo test
        working-directory: desktop/src-tauri
        run: cargo test

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: TypeScript type check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Frontend tests
        working-directory: desktop
        run: npx vitest run

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python tests
        run: PYTHONPATH=lib python3 -m pytest tests/ -v

  shell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check
        run: bash -n shell/ai-profile.sh

      - name: Shell smoke test
        run: bash tests/test_shell_smoke.sh
